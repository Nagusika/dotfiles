# ~/.config/tmux/tmux.conf — sobre. Préfixe C-a (disjoint de kitty_mod local).

# Préfixe.
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Couleurs vraies + features terminal.
set -g default-terminal "tmux-256color"
set -as terminal-features ',*:RGB'

# Indices 1-based + renumérotation des fenêtres.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Souris, gros historique, échappement réactif (vim).
set -g mouse on
set -g history-limit 50000
set -sg escape-time 10

# Splits : | et - , en conservant le répertoire courant.
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window   -c "#{pane_current_path}"

# Navigation des panes façon vim.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Redimensionnement (répétable).
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Rechargement de la config.
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf rechargé"

# Mode copie façon vim.
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Barre de statut sobre.
set -g status-style 'bg=default fg=white'
set -g status-left  '#[fg=cyan,bold]#S '
set -g status-right '#[fg=white]%Y-%m-%d %H:%M '
set -g status-justify left
setw -g window-status-current-style 'fg=black,bg=cyan,bold'
setw -g window-status-current-format ' #I:#W '
setw -g window-status-format ' #I:#W '
