"$schema" = 'https://starship.rs/config-schema.json'

# Prompt sobre, sur deux lignes, modules built-in uniquement (aucun `custom` qui
# forke un sous-shell à chaque prompt). Nerd Font requise pour les glyphes.

format = """
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
$character"""

add_newline = true
command_timeout = 500

[directory]
style = 'bold cyan'
truncation_length = 3
truncate_to_repo = true
read_only = ' '

[git_branch]
symbol = ' '
style = 'bold purple'
format = 'on [$symbol$branch]($style) '

[git_status]
style = 'bold yellow'
format = '([$all_status$ahead_behind]($style) )'
conflicted = '='
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
untracked = '?${count}'
stashed = '*${count}'
modified = '!${count}'
staged = '+${count}'
renamed = '»${count}'
deleted = '✘${count}'

[cmd_duration]
min_time = 2000
style = 'bold yellow'
format = 'took [$duration]($style) '

[character]
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red)'
vicmd_symbol = '[❮](bold green)'
