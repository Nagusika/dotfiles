# keybindings.conf — kitty_mod = ctrl+shift par défaut.

# Onglets (nouveaux avec le cwd courant grâce à la shell integration).
map kitty_mod+t new_tab_with_cwd
map kitty_mod+w close_tab
map kitty_mod+right next_tab
map kitty_mod+left  previous_tab

# Splits (fenêtres kitty en layout "splits").
enabled_layouts splits,stack
map kitty_mod+enter    launch --location=hsplit --cwd=current
map kitty_mod+\        launch --location=vsplit --cwd=current
map kitty_mod+q        close_window

# Navigation entre splits (style vim).
map kitty_mod+h neighboring_window left
map kitty_mod+j neighboring_window down
map kitty_mod+k neighboring_window up
map kitty_mod+l neighboring_window right

# Zoom d'un split (bascule stack).
map kitty_mod+z toggle_layout stack

# Taille de police.
map kitty_mod+equal     change_font_size all +1.0
map kitty_mod+minus     change_font_size all -1.0
map kitty_mod+0         change_font_size all 0

# Presse-papier.
map kitty_mod+c copy_to_clipboard
map kitty_mod+v paste_from_clipboard

# Rechargement de la config à chaud.
map kitty_mod+f5 load_config_file
