# kitty.conf — config principale. Corrige l'ancienne : plus de linux_display_server
# forcé (auto Wayland/X11), url_color correct (dans le thème), shell integration
# native explicite, splits et keybindings.

# --- Police (Nerd Font, variante Mono = glyphes mono-chasse) ---
font_family      family="JetBrainsMono Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 12.0
disable_ligatures never

# --- Shell integration native (fournit cwd, marques de prompt, etc.) ---
shell_integration enabled

# --- Fenêtre ---
background_opacity 0.95
initial_window_width  95c
initial_window_height 32c
window_padding_width 6
confirm_os_window_close 0
enable_audio_bell no
scrollback_lines 20000

# --- Onglets ---
tab_bar_style fade
tab_fade 1
active_tab_font_style   bold
inactive_tab_font_style normal
tab_title_template "{index}: {title}"

# --- URLs ---
url_style curly
detect_urls yes
open_url_with default

# --- Curseur ---
cursor_shape beam
cursor_blink_interval 0

# --- Thème (couleurs) et raccourcis ---
include theme.conf
include keybindings.conf
